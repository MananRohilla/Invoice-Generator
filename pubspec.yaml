name: invo_gen
description: "InvoGen — Professional Invoice Generator for Indian Businesses"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Auth
  google_sign_in: ^6.2.1

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Email
  flutter_email_sender: ^6.0.3

  # Animations
  lottie: ^3.1.0

  # Image Picker (business logo)
  image_picker: ^1.0.7

  # Permissions
  permission_handler: ^11.3.0

  # Formatting
  intl: ^0.19.0

  # UUID
  uuid: ^4.3.3

  # Environment variables
  flutter_dotenv: ^5.2.1

  # HTTP (Gemini API)
  http: ^1.2.1

  # Share / Open
  share_plus: ^7.2.2
  open_file: ^3.3.2

  # SVG rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/animations/
    - assets/fonts/
    - assets/google_icon.svg

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic
